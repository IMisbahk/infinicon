name: ci

on:
  push:
    branches: [main, feat/**]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Spec integrity
        run: python3 scripts/spec_integrity_check.py
