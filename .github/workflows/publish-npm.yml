name: publish npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: Why are you publishing manually?
        required: false
        default: hotfix

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org

      - name: Install
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build:packages

      - name: Publish @infinicon/core-types
        run: npm publish -w @infinicon/core-types --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @infinicon/sdk
        run: npm publish -w @infinicon/sdk --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @infinicon/server
        run: npm publish -w @infinicon/server --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
